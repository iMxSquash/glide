name: Feature request
description: Proposer une idée ou une amélioration pour Glide
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problème à résoudre
      description: Quel besoin ou frustration cette fonctionnalité adresse-t-elle ?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solution proposée
      description: Une description claire de ce que tu aimerais voir ajouté.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
      description: Les autres approches auxquelles tu as pensé, et pourquoi elles ne conviennent pas.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Contexte additionnel
      description: Maquettes, exemples d'autres apps, liens utiles, etc.
    validations:
      required: false
