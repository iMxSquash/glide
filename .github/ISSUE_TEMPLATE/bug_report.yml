name: Bug report
description: Signaler un comportement anormal de Glide
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Une description claire et concise du bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Voir l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
      description: Captures d'écran ou logs si pertinent.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS du PC
      placeholder: "ex. Windows 11"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version de Glide
      placeholder: "ex. v1.1.2"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Téléphone / navigateur
      placeholder: "ex. iPhone 15, Safari"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexte additionnel
      description: Réseau WiFi particulier, VPN actif, etc.
    validations:
      required: false
