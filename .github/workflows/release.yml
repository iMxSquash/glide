name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Clean install dependencies
        run: |
          if (Test-Path package-lock.json) { Remove-Item package-lock.json }
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
          npm install
        shell: pwsh

      - name: Build all
        run: npm run build:all

      - name: Build Windows
        run: npm run dist:win

      - name: List Windows build output
        shell: bash
        run: |
          echo "Contents of apps/server-electron/out:"
          ls -la apps/server-electron/out/ || echo "Directory not found"
          find apps/server-electron/out -name "*.exe" -type f || echo "No .exe found"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/server-electron/out/

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./dist-windows

      - name: List files (debug)
        run: |
          echo "Windows files:"
          ls -laR ./dist-windows/
          echo "Installer files only:"
          ls -la ./dist-windows/*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-windows/*.exe
            dist-windows/*.exe.blockmap
          body: |
            ## Glide ${{ github.ref_name }}

            Contrôle ton PC Windows à distance depuis ton téléphone (iPhone/Android), en trackpad tactile, sur le même WiFi. Connexion directe en WebRTC (peer-to-peer sur le LAN) : aucun port à ouvrir, aucun firewall à configurer.

            ### 📦 Installation Windows

            - Télécharger le fichier `.exe`
            - Lancer l'installateur
            - L'app démarre dans la barre système

            ### 🚀 Utilisation

            1. Lancer Glide sur ton PC : une fenêtre affiche le PIN et un QR code
            2. Scanner le QR code avec l'appareil photo du téléphone : ça ouvre directement la PWA (servie en HTTPS), déjà connectée à la bonne session
            3. Entrer le PIN affiché sur le PC
            4. Contrôler le PC avec les gestes trackpad !

            ### 🔥 Fonctionnalités
            - ✅ Trackpad tactile fluide (déplacement, clic gauche/droit, scroll 2 doigts, drag & drop)
            - ✅ Clavier virtuel et contrôle du volume système (slider + mute, synchronisé avec le PC)
            - ✅ Reconnexion automatique (WiFi coupé, écran verrouillé, PC redémarré)
            - ✅ Onboarding QR code en premier, PIN régénéré à chaque lancement
            - ✅ Connexion WebRTC chiffrée (DTLS) directement entre le PC et le téléphone, aucun port à ouvrir
            - ✅ PWA installable sur iPhone/Android, vrai HTTPS donc aucun certificat à accepter

            > Les deux appareils doivent être sur le même WiFi (le trafic trackpad reste sur le LAN, il ne passe jamais par internet).
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
